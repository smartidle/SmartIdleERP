<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartIdle ERP API 测试</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .card { background: #f5f5f5; padding: 20px; margin: 10px 0; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        pre { background: #272822; color: #f8f8f2; padding: 15px; overflow-x: auto; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        input { padding: 10px; margin: 5px; width: 300px; }
    </style>
</head>
<body>
    <h1>🎯 SmartIdle ERP API 测试工具</h1>
    
    <div class="card">
        <h2>1️⃣ 登录获取Token</h2>
        <input type="email" id="email" value="admin@erp.com" placeholder="邮箱">
        <input type="password" id="password" value="admin123" placeholder="密码">
        <br>
        <button onclick="login()">登录</button>
        <p>Token: <span id="token" style="word-break:break-all;"></span></p>
    </div>
    
    <div class="card">
        <h2>2️⃣ 测试API</h2>
        <button onclick="testAPI('/api/v1/dashboard')">仪表盘</button>
        <button onclick="testAPI('/api/v1/products')">产品列表</button>
        <button onclick="testAPI('/api/v1/customers')">客户列表</button>
        <button onclick="testAPI('/api/v1/suppliers')">供应商列表</button>
        <button onclick="testAPI('/api/v1/inventory')">库存列表</button>
        <button onclick="testAPI('/api/v1/sales-orders')">销售订单</button>
        <button onclick="testAPI('/api/v1/purchase-orders')">采购订单</button>
    </div>
    
    <div class="card">
        <h2>📋 响应结果</h2>
        <pre id="result">点击上面的按钮测试API...</pre>
    </div>
    
    <script>
        let token = '';
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = JSON.stringify(data, null, 2);
                
                if (data.success && data.data.access_token) {
                    token = data.data.access_token;
                    document.getElementById('token').innerHTML = '<span class="success">✓ 已获取Token</span><br>' + token;
                    document.getElementById('token').style.color = 'green';
                } else {
                    document.getElementById('token').innerHTML = '<span class="error">✗ 登录失败</span>';
                }
            } catch (e) {
                document.getElementById('result').innerHTML = '<span class="error">错误: ' + e.message + '</span>';
            }
        }
        
        async function testAPI(url) {
            if (!token) {
                document.getElementById('result').innerHTML = '<span class="error">请先登录获取Token！</span>';
                return;
            }
            
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 
                        'Authorization': 'Bearer ' + token,
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('result').innerHTML = '<span class="error">错误: ' + e.message + '</span>';
            }
        }
    </script>
</body>
</html>
