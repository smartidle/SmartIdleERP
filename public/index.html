<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartIdle ERP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area img { height: 60px; margin-bottom: 15px; }
        .logo-area h1 { font-size: 24px; color: #333; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        
        .captcha-row { display: flex; gap: 15px; align-items: flex-end; }
        .captcha-row .form-group { flex: 1; margin-bottom: 0; }
        
        .captcha-box {
            width: 120px;
            height: 44px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }
        .captcha-box img { width: 100%; height: 100%; object-fit: cover; }
        .captcha-box .refresh-btn {
            position: absolute;
            bottom: 2px; right: 2px;
            background: rgba(255,255,255,0.9);
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .login-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .error-msg { color: #ff4d4f; font-size: 13px; margin-top: 10px; text-align: center; display: none; }
        .footer { text-align: center; margin-top: 20px; color: #999; font-size: 12px; }
        
        .loading {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <img id="loginLogo" src="/Logo.png" alt="Logo" onerror="this.style.display='none'">
                <h1 id="systemName">SmartIdle ERP</h1>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" value="admin@erp.com" placeholder="Enter email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" value="admin123" placeholder="Enter password" required>
                </div>
                
                <div class="captcha-row" id="captchaRow">
                    <div class="form-group">
                        <label>Captcha Code</label>
                        <input type="text" id="captchaCode" placeholder="Enter code" maxlength="6">
                    </div>
                    <div class="captcha-box" id="captchaBox">
                        <img id="captchaImage" src="" alt="Captcha">
                        <button type="button" class="refresh-btn" onclick="refreshCaptcha()">↻</button>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">LOGIN</button>
                
                <p class="error-msg" id="errorMsg"></p>
            </form>
            
            <div class="footer">
                <span id="companyName">SmartIdle Tech Inc.</span>
            </div>
        </div>
    </div>
    
    <script>
        let captchaKey = '';
        let captchaEnabled = true;
        
        async function loadConfig() {
            try {
                const response = await fetch('/api/v1/config/public');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('systemName').textContent = data.data.system_name || 'SmartIdle ERP';
                    document.getElementById('companyName').textContent = data.data.company_name || '';
                    document.title = (data.data.system_name || 'SmartIdle ERP') + ' - Login';
                    
                    if (data.data.login_logo) {
                        document.getElementById('loginLogo').src = data.data.login_logo + '?t=' + Date.now();
                    }
                    
                    captchaEnabled = data.data.captcha_enabled !== false;
                    document.getElementById('captchaRow').style.display = captchaEnabled ? 'flex' : 'none';
                    
                    if (captchaEnabled) {
                        refreshCaptcha();
                    }
                }
            } catch (e) {
                console.log('Config load error:', e);
            }
        }
        
        async function refreshCaptcha() {
            try {
                const response = await fetch('/api/v1/captcha');
                captchaKey = response.headers.get('X-Captcha-Key');
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                document.getElementById('captchaImage').src = url;
                
                // 获取验证码答案
                const formData = new FormData();
                formData.append('key', captchaKey);
                
                // 验证码是图片形式，用户需要手动查看并输入
                
            } catch (e) {
                console.log('Captcha error:', e);
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Logging in...';
            errorMsg.style.display = 'none';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const loginData = { email, password };
            
            if (captchaEnabled) {
                loginData.captcha_key = captchaKey;
                loginData.captcha_code = document.getElementById('captchaCode').value;
            }
            
            try {
                const response = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });
                
                const data = await response.json();
                
                if (data.success && data.data.access_token) {
                    localStorage.setItem('erp_token', data.data.access_token);
                    localStorage.setItem('erp_user', JSON.stringify(data.data.employee));
                    window.location.href = '/dashboard.html';
                } else {
                    errorMsg.textContent = data.message || 'Login failed';
                    errorMsg.style.display = 'block';
                    if (captchaEnabled) refreshCaptcha();
                }
            } catch (e) {
                errorMsg.textContent = 'Connection error';
                errorMsg.style.display = 'block';
                if (captchaEnabled) refreshCaptcha();
            }
            
            btn.disabled = false;
            btn.innerHTML = 'LOGIN';
        });
        
        loadConfig();
    </script>
</body>
</html>
